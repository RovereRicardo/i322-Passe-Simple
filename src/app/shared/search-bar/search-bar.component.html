<mat-form-field appearance="outline" class="search-field">
  <mat-label>Rechercher une recette…</mat-label>
  <input
    matInput
    type="search"
    [ngModel]="searchQuery()"
    (ngModelChange)="onQueryChange($event)"
    placeholder="Ex. fondue, raclette…"
  />
  <mat-icon matSuffix>search</mat-icon>
</mat-form-field>
