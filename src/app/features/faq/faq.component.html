<section class="faq-page">
  <h1 class="mat-headline-medium">FAQ</h1>

  <mat-accordion class="faq-accordion">
    @for (item of items; track item.question) {
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>{{ item.question }}</mat-panel-title>
        </mat-expansion-panel-header>
        <p>{{ item.answer }}</p>
      </mat-expansion-panel>
    }
  </mat-accordion>
</section>
